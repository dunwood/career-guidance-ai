<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>志远 · 家庭分歧诊断</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: #1e1e2e;
  --text: #e8e8f0;
  --muted: #6b6b8a;
  --accent: #ff3c5f;
  --accent2: #ffb347;
  --accent3: #00e5ff;
  --safe: #00c896;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif SC', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}

.container { max-width:480px; margin:0 auto; padding:0 20px; position:relative; z-index:1; }

.screen { display:none; padding:32px 0 60px; animation:fadeIn .35s ease; }
.screen.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.screen-label {
  font-family:'Space Mono',monospace; font-size:11px;
  letter-spacing:4px; color:var(--accent); text-transform:uppercase;
  margin-bottom:12px;
}
.screen-title {
  font-size:clamp(24px,7vw,32px); font-weight:900; line-height:1.2;
  margin-bottom:8px;
}
.screen-title span {
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.screen-sub { font-size:14px; color:var(--muted); line-height:1.7; margin-bottom:28px; }

.btn {
  width:100%; padding:18px; background:var(--accent); border:none; border-radius:14px;
  color:#fff; font-size:16px; font-family:'Noto Serif SC',serif; font-weight:700;
  cursor:pointer; transition:opacity .15s,transform .15s; margin-top:8px;
}
.btn:active { opacity:.85; transform:scale(.98); }
.btn.secondary {
  background:transparent; border:1.5px solid var(--border); color:var(--muted);
}
.btn.secondary:active { border-color:var(--accent); color:var(--accent); }

.question-wrap { margin-bottom:24px; }
.question-num {
  font-family:'Space Mono',monospace; font-size:11px; color:var(--muted);
  letter-spacing:2px; margin-bottom:10px;
}
.question-text { font-size:18px; font-weight:700; line-height:1.5; margin-bottom:16px; }
.options-list { display:flex; flex-direction:column; gap:10px; }
.option-btn {
  padding:16px 18px; background:var(--surface); border:1.5px solid var(--border);
  border-radius:14px; text-align:left; cursor:pointer;
  font-size:14px; font-family:'Noto Serif SC',serif; color:var(--text);
  line-height:1.5; transition:all .15s; width:100%;
}
.option-btn:hover { border-color:var(--accent3); color:var(--accent3); }
.option-btn.selected { border-color:var(--accent); background:rgba(255,60,95,.08); color:var(--text); }

.progress-wrap { height:3px; background:var(--border); border-radius:2px; margin-bottom:28px; }
.progress-bar { height:100%; background:var(--accent); border-radius:2px; transition:width .4s; }

.modal-spinner {
  width:32px; height:32px; border-radius:50%;
  border:3px solid var(--border); border-top-color:var(--accent3);
  animation:spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

.who-badge {
  display:inline-block; padding:4px 12px; border-radius:20px;
  font-size:11px; font-family:'Space Mono',monospace; letter-spacing:2px;
  margin-bottom:20px;
}
.who-badge.parent { background:rgba(255,60,95,.12); color:var(--accent); border:1px solid var(--accent); }
.who-badge.child { background:rgba(0,229,255,.12); color:var(--accent3); border:1px solid var(--accent3); }
</style>
</head>
<body>
<div class="container">

<!-- 步骤指示器 -->
<div style="display:flex;gap:6px;justify-content:center;padding:20px 0 0;" id="cfDots"></div>

<!-- 屏幕0：介绍页 -->
<div class="screen active" id="cf-screen0">
  <div class="screen-label">家庭分歧诊断</div>
  <h2 class="screen-title">志愿填报<br><span>家庭分歧诊断</span></h2>
  <p class="screen-sub">
    父母和孩子分别填写，3分钟内找出你们的分歧点，
    用数据代替争吵，找到双方都能接受的方向。
  </p>
  <div style="background:var(--surface);border:1px solid var(--border);
    border-radius:16px;padding:20px;margin-bottom:24px;">
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px;
      font-family:'Space Mono',monospace;letter-spacing:1px;">流程说明</div>
    <div style="font-size:14px;line-height:2;color:var(--text);">
      第一步：父母填写（约2分钟）<br>
      第二步：孩子填写（约3分钟）<br>
      第三步：查看分歧报告
    </div>
  </div>
  <button class="btn" onclick="startConflict()">开始诊断 →</button>
  <a href="index.html" style="display:block;text-align:center;
    margin-top:12px;font-size:13px;color:var(--muted);text-decoration:none;">
    ← 返回主页
  </a>
</div>

<!-- 屏幕1：父母填写 -->
<div class="screen" id="cf-screen1">
  <div class="screen-label">第一步 · 父母填写</div>
  <h2 class="screen-title">父母的<span>期望与判断</span></h2>
  <p class="screen-sub">请父母独立填写，不要参考孩子的想法</p>
  <span class="who-badge parent">👨‍👩‍👧 父母作答</span>
  <div class="progress-wrap"><div class="progress-bar" id="parent-progress" style="width:0%"></div></div>
  <div id="cf-parent-questions"></div>
  <button class="btn" id="parent-submit-btn" onclick="submitParent()" disabled>父母已填完 →</button>
</div>

<!-- 屏幕2：孩子填写 -->
<div class="screen" id="cf-screen2">
  <div class="screen-label">第二步 · 孩子填写</div>
  <h2 class="screen-title">孩子的<span>真实想法</span></h2>
  <p class="screen-sub">请孩子独立填写，说出真实想法</p>
  <span class="who-badge child">🧑 孩子作答</span>
  <div class="progress-wrap"><div class="progress-bar" id="child-progress" style="width:0%"></div></div>
  <div id="cf-child-questions"></div>
  <button class="btn" id="child-submit-btn" onclick="submitChild()" disabled>孩子已填完 →</button>
</div>

<!-- 屏幕3：分歧报告 -->
<div class="screen" id="cf-screen3">
  <div id="cf-result"></div>
</div>

<!-- API Key 入口 -->
<div style="text-align:center;padding:20px;font-size:12px;color:var(--muted);">
  <span onclick="promptApiKey()" style="cursor:pointer;text-decoration:underline;">
    设置 API Key（用于生成调解建议）
  </span>
</div>

</div><!-- /container -->

<script>
// ── 问卷数据 ──
const PARENT_QS = [
  { key:'score', text:'孩子预估的高考分数段？',
    options:['700分以上','650-700分','600-650分','550-600分','500-550分','500分以下'] },
  { key:'subject', text:'孩子是文科还是理科？',
    options:['理科','文科','综合（新高考不分文理）'] },
  { key:'priority', text:'你最希望孩子的职业具备什么？',
    options:['稳定，饿不死','收入高，有钱途','有社会地位，体面','孩子喜欢就好'] },
  { key:'risk', text:'你能接受的职业风险程度？',
    options:['稳定最重要，公务员/国企优先','稳定和发展都要','支持孩子去有挑战的行业'] },
  { key:'economic', text:'家里能支持孩子读到什么程度？',
    options:['本科毕业就要工作','可以支持读研（国内）','可以支持出国留学'] },
  { key:'parent_major', text:'你希望孩子学哪类专业方向？',
    options:['理工科（计算机/工程/医学）','商科（金融/管理/经济）','文社科（法律/教育/传媒）','艺术设计类','没有偏好，孩子决定'] },
  { key:'parent_career', text:'你希望孩子从事哪类职业？',
    options:['体制内（公务员/教师/医生）','大厂或外企','自己创业','没有偏好'] },
  { key:'parent_city', text:'你希望孩子将来在哪里工作生活？',
    options:['回家乡','在国内一线城市','出国发展','无所谓'] }
];

const CHILD_QS = [
  { key:'child_major', text:'你最想学哪类专业方向？',
    options:['理工科（计算机/工程/医学）','商科（金融/管理/经济）','文社科（法律/教育/传媒）','艺术设计类','还没想好'] },
  { key:'child_career', text:'你理想中的工作状态是？',
    options:['稳定，有固定上下班时间','高薪但压力大','有创造空间，做自己感兴趣的事','灵活自由，不想被约束'] },
  { key:'child_city', text:'你希望将来在哪里工作生活？',
    options:['回家乡','在国内大城市闯一闯','出国看看','无所谓'] },
  { key:'child_priority', text:'对你来说职业最重要的是？',
    options:['钱，越多越好','稳定，不焦虑','有意义，做有价值的事','自由，时间自己控制'] },
  { key:'pressure', text:'你能接受的工作压力程度？',
    options:['高压没关系，值得就行','中等压力，能接受','希望压力小一点','我怕压力大影响健康'] },
  { key:'study_style', text:'你喜欢哪种学习/工作方式？',
    options:['动手实践，做出来才算','深度研究，搞清楚原理','与人合作，一起解决问题','自由创作，表达自己'] },
  { key:'ai_aware', text:'你怎么看AI对职业的冲击？',
    options:['很担心，想选AI替代不了的方向','有点担心，但不是最重要的考虑','不担心，AI也需要人来用','没想过这个问题'] },
  { key:'parent_conflict', text:'你和父母在选专业上有没有分歧？',
    options:['基本一致，没什么分歧','有一些分歧，但还好','分歧很大，经常为这个吵架','还没讨论过'] }
];

// ── 状态 ──
const state = {
  parentAnswers: {},
  childAnswers: {},
  currentScreen: 0
};

// ── 步骤点 ──
function updateDots(step) {
  const dots = document.getElementById('cfDots');
  dots.innerHTML = [0,1,2,3].map(i => {
    const cls = i < step ? 'done' : i === step ? 'active' : '';
    return `<div style="width:${cls==='active'?'20px':'6px'};height:6px;border-radius:${cls==='active'?'3px':'50%'};
      background:${cls==='done'?'var(--safe)':cls==='active'?'var(--accent)':'var(--border)'};
      transition:all .3s;"></div>`;
  }).join('');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── 渲染问卷 ──
function renderQuestions(questions, containerId, answersObj, progressId, submitBtnId) {
  const container = document.getElementById(containerId);
  container.innerHTML = questions.map((q, i) => `
    <div class="question-wrap">
      <div class="question-num">Q${i+1} / ${questions.length}</div>
      <div class="question-text">${q.text}</div>
      <div class="options-list">
        ${q.options.map(opt => `
          <button class="option-btn ${answersObj[q.key]===opt?'selected':''}"
            onclick="selectAnswer('${q.key}','${opt.replace(/'/g,"\\'")}','${containerId}','${progressId}','${submitBtnId}')">
            ${opt}
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function selectAnswer(key, val, containerId, progressId, submitBtnId) {
  const isParent = containerId === 'cf-parent-questions';
  const answersObj = isParent ? state.parentAnswers : state.childAnswers;
  const questions = isParent ? PARENT_QS : CHILD_QS;

  answersObj[key] = val;

  // 更新选中样式
  const container = document.getElementById(containerId);
  const allWraps = container.querySelectorAll('.question-wrap');
  questions.forEach((q, i) => {
    const btns = allWraps[i].querySelectorAll('.option-btn');
    btns.forEach(btn => {
      btn.classList.toggle('selected', btn.textContent.trim() === val && q.key === key);
    });
    // 重新渲染该题的选中状态
    btns.forEach(btn => {
      btn.classList.remove('selected');
      if (q.key === key && btn.textContent.trim() === val) btn.classList.add('selected');
      else if (q.key !== key && answersObj[q.key] && btn.textContent.trim() === answersObj[q.key]) btn.classList.add('selected');
    });
  });

  // 更新进度条
  const answered = Object.keys(answersObj).length;
  const total = questions.length;
  const pct = Math.round(answered / total * 100);
  document.getElementById(progressId).style.width = pct + '%';

  // 启用提交按钮
  const allAnswered = questions.every(q => answersObj[q.key]);
  document.getElementById(submitBtnId).disabled = !allAnswered;
}

// ── 流程控制 ──
function startConflict() {
  updateDots(1);
  renderQuestions(PARENT_QS, 'cf-parent-questions', state.parentAnswers, 'parent-progress', 'parent-submit-btn');
  showScreen('cf-screen1');
}

function submitParent() {
  if (PARENT_QS.some(q => !state.parentAnswers[q.key])) {
    alert('请完成所有题目');
    return;
  }
  updateDots(2);
  renderQuestions(CHILD_QS, 'cf-child-questions', state.childAnswers, 'child-progress', 'child-submit-btn');
  showScreen('cf-screen2');
}

function submitChild() {
  if (CHILD_QS.some(q => !state.childAnswers[q.key])) {
    alert('请完成所有题目');
    return;
  }
  updateDots(3);
  showScreen('cf-screen3');
  renderConflictResult(state.parentAnswers, state.childAnswers);
}

// ── 分歧分析 ──
function analyzeConflict(parentAnswers, childAnswers) {
  const conflicts = [];
  const agreements = [];

  // 专业方向对比
  if (parentAnswers.parent_major !== '没有偏好，孩子决定' &&
      parentAnswers.parent_major !== childAnswers.child_major) {
    conflicts.push({
      topic: '专业方向',
      parent: parentAnswers.parent_major,
      child: childAnswers.child_major,
      severity: 'high'
    });
  } else if (parentAnswers.parent_major === childAnswers.child_major) {
    agreements.push('专业方向');
  }

  // 职业类型对比
  const careerMap = {
    '体制内（公务员/教师/医生）': '稳定，有固定上下班时间',
    '大厂或外企': '高薪但压力大',
    '自己创业': '灵活自由，不想被约束'
  };
  if (parentAnswers.parent_career !== '没有偏好' &&
      careerMap[parentAnswers.parent_career] !== childAnswers.child_career) {
    conflicts.push({
      topic: '职业类型',
      parent: parentAnswers.parent_career,
      child: childAnswers.child_career,
      severity: 'high'
    });
  }

  // 城市对比
  const cityMap = { '回家乡':'回家乡', '在国内一线城市':'在国内大城市闯一闯', '出国发展':'出国看看', '无所谓':'无所谓' };
  if (parentAnswers.parent_city !== '无所谓' &&
      childAnswers.child_city !== '无所谓' &&
      cityMap[parentAnswers.parent_city] !== childAnswers.child_city) {
    conflicts.push({
      topic: '工作城市',
      parent: parentAnswers.parent_city,
      child: childAnswers.child_city,
      severity: 'medium'
    });
  }

  // 价值观对比（稳定vs自由）
  const parentWantsStable = parentAnswers.priority === '稳定，饿不死' ||
    parentAnswers.risk === '稳定最重要，公务员/国企优先';
  const childWantsFreedom = childAnswers.child_priority === '自由，时间自己控制' ||
    childAnswers.child_career === '有创造空间，做自己感兴趣的事' ||
    childAnswers.child_career === '灵活自由，不想被约束';
  if (parentWantsStable && childWantsFreedom) {
    conflicts.push({
      topic: '价值观',
      parent: '稳定优先',
      child: '自由优先',
      severity: 'high'
    });
  }

  return { conflicts, agreements };
}

// ── AI 调解建议 ──
async function generateConflictAdvice(parentAnswers, childAnswers, conflicts) {
  const apiKey = localStorage.getItem('deepseek_api_key');

  const conflictDesc = conflicts.map(c =>
    `【${c.topic}】父母希望：${c.parent}；孩子希望：${c.child}`
  ).join('\n');

  const prompt = `你是一位经验丰富的家庭教育顾问，专门帮助家庭解决高考志愿填报中的分歧。

## 家庭情况
父母期望：
- 专业方向：${parentAnswers.parent_major}
- 职业类型：${parentAnswers.parent_career}
- 最看重：${parentAnswers.priority}
- 风险偏好：${parentAnswers.risk}

孩子想法：
- 专业方向：${childAnswers.child_major}
- 工作状态：${childAnswers.child_career}
- 最看重：${childAnswers.child_priority}
- 对AI的态度：${childAnswers.ai_aware}

## 主要分歧
${conflictDesc || '分歧不大，基本一致'}

## 要求
请生成一份约600字的家庭调解建议，包含：

1. **分歧诊断**（100字）：用一句话点出这个家庭分歧的根本原因
2. **给父母说**（200字）：理解孩子的出发点，哪些担心是合理的，哪些可以放下
3. **给孩子说**（200字）：理解父母的出发点，哪些诉求值得认真对待
4. **折中方案**（100字）：给出1-2个双方都能接受的具体专业方向建议

语气要求：
- 像一个真正懂教育的长辈在说话
- 不偏袒任何一方
- 有真实判断，不说废话
- 结尾给一个明确的行动建议`;

  try {
    if (!apiKey) return '请填写 API Key 后查看 AI 调解建议（点击页面底部「设置 API Key」）';

    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 2000
      })
    });
    const data = await res.json();
    return data.choices[0].message.content;
  } catch(e) {
    return '生成失败，请检查网络连接';
  }
}

// ── 渲染分歧报告 ──
async function renderConflictResult(parentAnswers, childAnswers) {
  const { conflicts, agreements } = analyzeConflict(parentAnswers, childAnswers);
  const screen3 = document.getElementById('cf-result');

  screen3.innerHTML = `
    <div class="screen-label">诊断结果</div>
    <h2 class="screen-title">发现 <span>${conflicts.length} 个分歧</span></h2>
    <p class="screen-sub">${conflicts.length === 0
      ? '恭喜，你们的想法基本一致！'
      : '用数据代替争吵，找到共同方向'}</p>

    ${conflicts.length === 0 ? `
      <div style="background:rgba(0,200,150,.08);border:1px solid var(--safe);
        border-radius:16px;padding:20px;margin-bottom:16px;text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">🎉</div>
        <div style="color:var(--safe);font-size:15px;font-weight:700;">你们的方向基本一致</div>
        <div style="color:var(--muted);font-size:13px;margin-top:8px;">
          这已经赢过很多家庭了，接下来可以一起做完整的专业测评
        </div>
      </div>
    ` : ''}

    ${conflicts.map(c => `
      <div style="background:var(--surface);border:1.5px solid ${c.severity==='high'?'var(--accent)':'var(--accent2)'};
        border-radius:16px;padding:20px;margin-bottom:12px;">
        <div style="font-size:11px;color:${c.severity==='high'?'var(--accent)':'var(--accent2)'};
          font-family:'Space Mono',monospace;letter-spacing:2px;margin-bottom:10px;">
          ${c.severity==='high'?'⚠️ 主要分歧':'💬 次要分歧'} · ${c.topic}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div style="padding:10px;background:rgba(255,60,95,.06);border-radius:10px;">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">父母希望</div>
            <div style="font-size:14px;">${c.parent}</div>
          </div>
          <div style="padding:10px;background:rgba(0,229,255,.06);border-radius:10px;">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">孩子希望</div>
            <div style="font-size:14px;">${c.child}</div>
          </div>
        </div>
      </div>
    `).join('')}

    <div id="cf-advice" style="background:var(--surface);border:1px solid var(--border);
      border-radius:16px;padding:20px;margin-bottom:20px;">
      <div style="font-size:11px;color:var(--accent3);font-family:'Space Mono',monospace;
        letter-spacing:2px;margin-bottom:12px;">AI 调解建议</div>
      <div style="text-align:center;color:var(--muted);padding:20px 0;">
        <div class="modal-spinner" style="margin:0 auto 12px;"></div>
        正在生成调解建议…
      </div>
    </div>

    <button class="btn secondary" onclick="location.href='index.html'" style="margin-bottom:8px;">
      → 去做完整专业测评
    </button>
    <button class="btn secondary" onclick="restartConflict()">
      重新诊断
    </button>
  `;

  // 异步生成调解建议
  const advice = await generateConflictAdvice(parentAnswers, childAnswers, conflicts);
  document.getElementById('cf-advice').innerHTML = `
    <div style="font-size:11px;color:var(--accent3);font-family:'Space Mono',monospace;
      letter-spacing:2px;margin-bottom:12px;">AI 调解建议</div>
    <div style="font-size:14px;line-height:1.9;color:var(--text);">
      ${advice
        .replace(/\n/g,'<br>')
        .replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--accent2)">$1</strong>')}
    </div>
  `;
}

function restartConflict() {
  state.parentAnswers = {};
  state.childAnswers = {};
  updateDots(0);
  showScreen('cf-screen0');
}

function promptApiKey() {
  const current = localStorage.getItem('deepseek_api_key') || '';
  const key = prompt('请输入 DeepSeek API Key：', current);
  if (key !== null && key.trim()) {
    localStorage.setItem('deepseek_api_key', key.trim());
    alert('API Key 已保存');
  }
}

updateDots(0);
</script>
</body>
</html>
