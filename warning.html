<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026专业避雷榜 · 志远择业助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: #1e1e2e;
  --text: #e8e8f0;
  --muted: #6b6b8a;
  --accent: #ff3c5f;
  --accent2: #ffb347;
  --accent3: #00e5ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif SC', serif;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
}
.warning-header {
  padding: 40px 20px 32px;
  text-align: center;
}
.brand {
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 4px;
  margin-bottom: 16px;
  font-family: 'Space Mono', monospace;
  text-transform: uppercase;
}
h1 {
  font-size: 48px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 16px;
}
h1 span { color: var(--accent); }
.sub {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 12px;
}
.share-hint {
  font-size: 12px;
  color: var(--accent3);
  letter-spacing: 2px;
}
.warning-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  margin: 0 20px 16px;
}
.warning-card.top-card { border-color: var(--accent); }
.rank-badge {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.major-name {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 8px;
}
.verdict {
  font-size: 14px;
  color: var(--accent2);
  margin-bottom: 16px;
  line-height: 1.6;
  padding: 8px 12px;
  background: rgba(255,179,71,.06);
  border-left: 3px solid var(--accent2);
  border-radius: 0 8px 8px 0;
}
.risk-bars { margin-bottom: 4px; }
.risk-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 12px;
}
.risk-label {
  min-width: 52px;
  color: var(--muted);
}
.risk-bar {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  position: relative;
}
.risk-fill {
  position: absolute;
  left: 0; top: 0;
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
}
.risk-desc {
  font-size: 11px;
  color: var(--muted);
  min-width: 80px;
  text-align: right;
}
.exception {
  font-size: 13px;
  color: var(--muted);
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  line-height: 1.6;
}
.warning-footer {
  text-align: center;
  padding: 32px 20px 48px;
}
.btn-goto {
  display: block;
  padding: 18px;
  background: var(--accent);
  color: white;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  margin: 0 20px 24px;
}
.warning-footer p {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div class="warning-header">
  <div class="brand">志远 · 高考择业助手</div>
  <h1>2026<br><span>专业避雷榜</span></h1>
  <p class="sub">基于AI替代风险 × 就业饱和度 × 窗口期三维数据<br>这10个专业，请三思而后行</p>
  <div class="share-hint">↓ 截图保存 · 转发给需要的人</div>
</div>

<div id="cards"></div>

<div class="warning-footer">
  <a href="index.html" class="btn-goto">→ 测测你适合什么专业</a>
  <p>数据来源：职业AI风险数据库 × 四维择业框架</p>
  <p>志远出品 · 2026.03 · v2.0</p>
</div>

function renderCards() {
  const container = document.getElementById('cards');
  container.innerHTML = WARNING_DATA.map((d, i) => {
    const fillPct = Math.round(d.risk_score * 10) + '%';
    return `
    <div class="warning-card${i === 0 ? ' top-card' : ''}">
      <div class="rank-badge">#${d.rank} · 风险指数 ${d.risk_score}/10</div>
      <div class="major-name">${d.name}</div>
      <div class="verdict">${d.verdict}</div>
      <div class="risk-bars">
        <div class="risk-row">
          <span class="risk-label">AI替代</span>
          <div class="risk-bar"><div class="risk-fill" style="width:${fillPct}"></div></div>
          <span class="risk-desc">${d.ai_risk}</span>
        </div>
        <div class="risk-row">
          <span class="risk-label">市场饱和</span>
          <div class="risk-bar"><div class="risk-fill" style="width:${fillPct}"></div></div>
          <span class="risk-desc">${d.market_risk}</span>
        </div>
        <div class="risk-row">
          <span class="risk-label">窗口期</span>
          <div class="risk-bar"><div class="risk-fill" style="width:${fillPct}"></div></div>
          <span class="risk-desc">${d.window_risk}</span>
        </div>
      </div>
      <div class="exception">💡 例外：${d.exception}</div>
    </div>`;
  }).join('');
}

renderCards();
</script>
</body>
</html>
